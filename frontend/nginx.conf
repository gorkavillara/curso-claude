server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Real 404 for static assets so MIME mismatches do not get masked by the SPA fallback.
  location ~* \.(?:js|mjs|css|map|ico|png|jpg|svg|woff2?)$ {
    try_files $uri =404;
    add_header Cache-Control "no-cache";
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
